# BUG FIX: was "server.port=${FLASK_PORT:5000}"
# Spring Boot uses "server.port", but the env-var name was Flask-specific.
# Changed default to 8080 (Spring Boot standard).
server.port=${SERVER_PORT:5000}

app.knn.k=${KNN_K:3}
app.knn.rssi-missing=${RSSI_MISSING:-100}

app.zone.history-size=${ZONE_HISTORY_SIZE:5}
app.zone.confidence-threshold=${ZONE_CONFIDENCE_THRESHOLD:0.6}

app.data.dir=${DATA_DIR:${user.dir}/arnavigation/data}
app.data.fingerprints-path=${app.data.dir}/fingerprints.json
app.data.building-graph-path=${app.data.dir}/building_graph.json
app.data.rooms-path=${app.data.dir}/rooms.json
app.data.floorplans-dir=${app.data.dir}/floorplans
# BUG FIX: ap-map-path should point to ap_map.json, not fingerprints.json
app.data.ap-map-path=${app.data.dir}/ap_map.json

logging.level.com.arnav=DEBUG
